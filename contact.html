<body>
    <h2 id="contactformTitle"> Contact Us</h2>
    <form class="contactForm" aria-labelledby="contactformTitle" action="#" method="post">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="user_name" required placeholder="Enter Your Name"
                aria-describedby="usernameHelp">
            <p id="usernameHelp">Enter your full name so we know who is contacting us.</p>
        </div>
        <br>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="user_email" required placeholder="Enter Your Email"
                aria-describedby="emailHelp">
            <p id="emailHelp">We will only use your email to respond to your message.</p>
        </div>
        <br>
        <div>
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required placeholder="Subject">
        </div>
        <br>
        <div>
            <label for="message">Message</label>
            <textarea id="message" name="user_message" required placeholder="Enter Your message here"
                row="5"></textarea>
            <br>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
        <div id="formStatus" aria-live="polite"></div>
    </form>
</body>
